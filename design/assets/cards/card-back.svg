<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" width="300" height="520" role="img" aria-label="LUX tarot card back">
  <defs>
    <radialGradient id="ground" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#241B18"/>
      <stop offset="60%" stop-color="#1A1412"/>
      <stop offset="100%" stop-color="#120D0B"/>
    </radialGradient>
    <linearGradient id="goldSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4CB84"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9C7E33"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="300" height="520" rx="16" fill="url(#ground)"/>

  <!-- ornate border frame -->
  <rect x="14" y="14" width="272" height="492" rx="10" fill="none" stroke="url(#goldSheen)" stroke-width="2"/>
  <rect x="22" y="22" width="256" height="476" rx="7" fill="none" stroke="#6B1A1A" stroke-width="3"/>
  <rect x="27" y="27" width="246" height="466" rx="5" fill="none" stroke="url(#goldSheen)" stroke-width="1"/>

  <!-- corner flourishes -->
  <g fill="none" stroke="url(#goldSheen)" stroke-width="1.4" stroke-linecap="round">
    <path d="M40 40 q22 0 22 22 M40 40 q0 22 22 22"/>
    <path d="M260 40 q-22 0 -22 22 M260 40 q0 22 -22 22"/>
    <path d="M40 480 q22 0 22 -22 M40 480 q0 -22 22 -22"/>
    <path d="M260 480 q-22 0 -22 -22 M260 480 q0 -22 -22 -22"/>
    <circle cx="62" cy="62" r="2.2" fill="url(#goldSheen)" stroke="none"/>
    <circle cx="238" cy="62" r="2.2" fill="url(#goldSheen)" stroke="none"/>
    <circle cx="62" cy="458" r="2.2" fill="url(#goldSheen)" stroke="none"/>
    <circle cx="238" cy="458" r="2.2" fill="url(#goldSheen)" stroke="none"/>
  </g>

  <!-- central emblem -->
  <g transform="translate(150 260)">
    <circle cx="0" cy="0" r="120" fill="url(#halo)"/>

    <!-- radiating sun rays -->
    <g stroke="url(#goldSheen)" stroke-width="1.2" stroke-linecap="round">
      <g id="rays">
        <line x1="0" y1="-70" x2="0" y2="-98"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(30)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(60)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(90)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(120)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(150)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(180)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(210)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(240)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(270)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(300)"/>
        <line x1="0" y1="-70" x2="0" y2="-98" transform="rotate(330)"/>
      </g>
      <!-- short rays between -->
      <g opacity="0.65">
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(15)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(45)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(75)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(105)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(135)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(165)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(195)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(225)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(255)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(285)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(315)"/>
        <line x1="0" y1="-74" x2="0" y2="-88" transform="rotate(345)"/>
      </g>
    </g>

    <!-- outer ring -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="url(#goldSheen)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#6B1A1A" stroke-width="2"/>

    <!-- crescent moon cradling a star -->
    <path d="M0 -34 A34 34 0 1 0 24 26 A28 28 0 1 1 0 -34 Z" fill="url(#goldSheen)"/>
    <!-- eight-point star -->
    <g fill="#F2E8D5">
      <path d="M12 -6 L15 4 L25 7 L15 10 L12 20 L9 10 L-1 7 L9 4 Z" opacity="0.95"/>
    </g>
    <!-- small orbiting stars -->
    <g fill="url(#goldSheen)">
      <circle cx="-34" cy="-30" r="1.8"/>
      <circle cx="40" cy="-18" r="1.4"/>
      <circle cx="-40" cy="18" r="1.4"/>
      <circle cx="30" cy="40" r="1.8"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="150" y="486" text-anchor="middle" fill="url(#goldSheen)"
        font-family="'Playfair Display', Georgia, serif" font-size="15"
        font-weight="700" letter-spacing="6">LUX</text>
</svg>
